<!DOCTYPE html>
<html lang="ja">

<head>
    <title>ugd難易度表</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="bmstable" content="header.json" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous">
    </script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar with custom gradient class -->
    <header class="mb-4">
        <nav class="navbar navbar-dark nav-gradient shadow-sm">
            <div class="container">
                <span class="navbar-brand mb-0 h1 fw-bold">ugd難易度表</span>
            </div>
        </nav>
    </header>

    <div class="container">
        <!-- Floating Info Card -->
        <div class="card glass-card info-card mb-4 border-0">
            <div class="card-body">
                <h5 class="card-title fw-bold text-accent mb-3">Notice</h5>
                <p class="card-text mb-1 text-secondary">ugdさんが作成した譜面集</p>
                <p class="card-text mb-1 text-secondary">難易度表の読み込みと表示に数秒かかる可能性があります</p>
                <hr class="soft-hr">
                <p class="card-text mb-1 text-secondary">
                    最終更新: 2026/04/24
                </p>
            </div>
        </div>

        <!-- ここから難易度表本体 -->
        <div class="card glass-card border-0 p-3 p-md-4 main-table-container">
            <div class="table-responsive">
                <table class="table align-middle luminous-table" id="table_int">
                </table>
            </div>
        </div>
        
        <script language="javascript" type="text/javascript">
            $(document).ready(function () {
                $.getJSON($("meta[name=bmstable]").attr("content"), function (header) {
                    $.getJSON(header.data_url, function (information) {
                        makeBMSTable(information, header.symbol);
                    });
                });
            });

            function makeBMSTable(info, mark) {
                var x = "";
                var obj = $("#table_int");
                var obj_sep = null;
                var count = 0;

                obj.html("");
                
                // Table Header
                $("<thead class='table-header'><tr>" +
                  "<th width='12%'>Level</th>" +
                  "<th width='40%'>Title</th>" +
                  "<th width='35%'>Artist</th>" +
                  "<th width='13%'>Comment</th>" +
                  "</tr></thead><tbody class='table-body border-top-0'>").appendTo(obj);

                for (var i = 0; i < info.length; i++) {
                    if (x != info[i].level) {
                        if (obj_sep != null) {
                            obj_sep.html("<td colspan='4' class='level-separator-content'>" +
                                "<span class='separator-badge'>" + mark + x + " (" + count + "譜面)</span></td>");
                        }
                        obj_sep = $("<tr class='level-separator' id='" + mark + info[i].level + "'></tr>");
                        obj_sep.appendTo(obj);
                        count = 0;
                        x = info[i].level;
                    }

                    var str = $("<tr class='luminous-row'></tr>");

                    // Level (Badge UI)
                    $("<td class='level-cell'><span class='level-badge shadow-sm'>" + mark + x + "</span></td>").appendTo(str);

                    // Title
                    $("<td class='title-cell'>" +
                        "<a class='song-title' href='http://www.dream-pro.info/~lavalse/LR2IR/search.cgi?mode=ranking&bmsmd5=" + info[i].md5 + "' target='_blank'>" + info[i].title + "</a></td>").appendTo(str);

                    // Artist
                    $("<td class='artist-cell text-secondary'>" + info[i].artist + "</td>").appendTo(str);

                    // Comment
                    $("<td class='comment-cell text-muted'>" + info[i].comment + "</td>").appendTo(str);
                    
                    str.appendTo(obj);
                    count++;
                }
                
                $("</tbody>").appendTo(obj);

                if (obj_sep != null) {
                    obj_sep.html("<td colspan='4' class='level-separator-content'>" +
                        "<span class='separator-badge'>" + mark + x + " (" + count + "譜面)</span></td>");
                }
            }
        </script>
    </div>

</html>
